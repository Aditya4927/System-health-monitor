apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor
  labels:
    app: health-monitor
spec:
  replicas: 2                        # Run 2 pods for availability
  selector:
    matchLabels:
      app: health-monitor
  template:
    metadata:
      labels:
        app: health-monitor
    spec:
      containers:
        - name: health-monitor
          image: health-monitor:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          # Resource limits — important for K8s scheduling
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Liveness probe — K8s restarts pod if this fails
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness probe — K8s won't send traffic until this passes
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
