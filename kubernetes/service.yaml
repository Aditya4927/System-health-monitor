apiVersion: v1
kind: Service
metadata:
  name: health-monitor-service
spec:
  selector:
    app: health-monitor
  type: NodePort          # Use LoadBalancer if deploying to cloud
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080     # Access via localhost:30080 on Minikube
